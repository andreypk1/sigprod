<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Cambiar contraseña · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4" style="max-width:520px;">
    <h1 class="h5 mb-4"><i class="bi bi-shield-lock-fill me-2 text-primary"></i>Cambiar contraseña</h1>

    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 small"
         th:if="${error != null}">
      <i class="bi bi-exclamation-triangle flex-shrink-0"></i>
      <span th:text="${error}"></span>
    </div>
    <div class="alert alert-success d-flex align-items-center gap-2 py-2 small"
         th:if="${exito != null}">
      <i class="bi bi-check-circle flex-shrink-0"></i>
      <span th:text="${exito}"></span>
    </div>

    <div class="card shadow-sm p-4">
      <form th:action="@{/perfil/cambiar-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Contraseña actual</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="password" name="passwordActual" class="form-control" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Nueva contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="passwordNueva" class="form-control" required minlength="8"/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Confirmar nueva contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirmarPassword" class="form-control" required minlength="8"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-floppy-fill me-2"></i>Actualizar contraseña
        </button>
      </form>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
