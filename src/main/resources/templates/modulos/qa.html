<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>QA · Defectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h4">QA · Defectos</h1>
    <p class="text-muted">Registro y seguimiento de defectos por proyecto.</p>
    <div class="alert alert-success py-2" th:if="${msg}" th:text="${msg}"></div>

    <form class="card p-3 mb-4 shadow-sm" method="get" th:action="@{/qa}">
      <label class="form-label">Proyecto</label>
      <select name="proyectoId" class="form-select" onchange="this.form.submit()">
        <option value="">— Seleccione —</option>
        <option th:each="p : ${proyectos}" th:value="${p.id}" th:selected="${proyectoId == p.id}" th:text="${p.nombre}"></option>
      </select>
    </form>

    <th:block th:if="${proyectoId != null and !proyectoId.isEmpty()}">
      <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Defecto</div>
        <div class="card-body">
          <form th:action="@{/qa/defecto/guardar}" th:object="${defecto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{proyectoId}" />
            <div class="mb-2"><label class="form-label">Título</label><input class="form-control" th:field="*{titulo}" required/></div>
            <div class="mb-2"><label class="form-label">Descripción</label><textarea class="form-control" th:field="*{descripcion}" rows="2"></textarea></div>
            <div class="row g-2">
              <div class="col-md-3"><label class="form-label">Severidad</label><input class="form-control" th:field="*{severidad}"/></div>
              <div class="col-md-3"><label class="form-label">Prioridad</label><input class="form-control" th:field="*{prioridad}"/></div>
              <div class="col-md-3"><label class="form-label">Estado</label><input class="form-control" th:field="*{estado}"/></div>
              <div class="col-md-3"><label class="form-label">Ambiente</label><input class="form-control" th:field="*{ambiente}"/></div>
              <div class="col-md-6"><label class="form-label">Tarea relacionada (id)</label><input class="form-control" th:field="*{tareaId}"/></div>
              <div class="col-md-6"><label class="form-label">Evidencia (URL)</label><input class="form-control" th:field="*{evidenciaUrl}"/></div>
              <div class="col-md-6"><label class="form-label">Reportado por</label>
                <select class="form-select" th:field="*{reportadoPorId}">
                  <option value="">—</option>
                  <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombreCompleto()}"></option>
                </select>
              </div>
              <div class="col-md-6"><label class="form-label">Asignado a</label>
                <select class="form-select" th:field="*{asignadoAId}">
                  <option value="">—</option>
                  <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombreCompleto()}"></option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-sm mt-2">Guardar defecto</button>
            <a th:if="${defecto.id != null}" th:href="@{/qa(proyectoId=${proyectoId})}" class="btn btn-outline-secondary btn-sm mt-2 ms-1">Nuevo</a>
          </form>
        </div>
      </div>

      <div class="table-responsive card shadow-sm">
        <table class="table mb-0 table-sm">
          <thead><tr><th>Título</th><th>Severidad</th><th>Estado</th><th></th></tr></thead>
          <tbody>
          <tr th:each="d : ${defectos}">
            <td th:text="${d.titulo}">—</td>
            <td th:text="${d.severidad}">—</td>
            <td th:text="${d.estado}">—</td>
            <td class="text-end text-nowrap">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/qa(proyectoId=${proyectoId},editDefecto=${d.id})}">Editar</a>
              <form th:action="@{|/qa/defecto/${d.id}/eliminar|}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="proyectoId" th:value="${proyectoId}" />
                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </th:block>
  </main>
</div>
</body>
</html>
