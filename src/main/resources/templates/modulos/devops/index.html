<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>DevOps · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h5 mb-4"><i class="bi bi-cloud-upload me-2 text-primary"></i>DevOps</h1>
    <div class="row g-3">
      <div class="col-md-4" th:each="p : ${proyectos}">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h2 class="h6 mb-2" th:text="${p.nombre}">Proyecto</h2>
            <a class="btn btn-outline-primary btn-sm d-block mb-2" th:href="@{/devops/{id}/pipelines(id=${p.id})}">Pipelines CI/CD</a>
            <a class="btn btn-outline-success btn-sm d-block mb-2" th:href="@{/devops/{id}/ambientes(id=${p.id})}">Ambientes</a>
            <a class="btn btn-outline-warning btn-sm d-block" th:href="@{/devops/{id}/incidentes(id=${p.id})}">Incidentes</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
