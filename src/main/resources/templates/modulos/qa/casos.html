<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|Casos de prueba · ${plan.nombre}|">Casos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/qa}">QA</a></li>
        <li class="breadcrumb-item"><a th:href="@{/qa/{id}/planes(id=${proyecto.id})}" th:text="${proyecto.nombre}"></a></li>
        <li class="breadcrumb-item active" th:text="${plan.nombre}"></li>
      </ol>
    </nav>
    <div class="d-flex justify-content-between mb-3">
      <h1 class="h5 mb-0">Casos de prueba</h1>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCaso"><i class="bi bi-plus-circle-fill me-1"></i>Nuevo caso</button>
    </div>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><span th:text="${ok}"></span></div>
    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0 align-middle">
        <thead class="table-light"><tr><th>Nombre</th><th>Prioridad</th><th>Tipo</th><th>Estado</th></tr></thead>
        <tbody>
          <tr th:each="c : ${casos}">
            <td th:text="${c.nombre}">Caso</td>
            <td><span class="badge bg-secondary" th:text="${c.prioridad}">ALTA</span></td>
            <td th:text="${c.tipo}">FUNCIONAL</td>
            <td><span class="badge bg-warning text-dark" th:text="${c.estado}">PENDIENTE</span></td>
          </tr>
          <tr th:if="${casos.isEmpty()}"><td colspan="4" class="text-center text-muted py-3 small">Sin casos.</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal fade" id="modalCaso" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <form th:action="@{/qa/{pid}/planes/{planId}/casos(pid=${proyecto.id},planId=${plan.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nuevo caso</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body row g-2">
              <div class="col-12"><label class="form-label">Nombre</label><input class="form-control" name="nombre" required/></div>
              <div class="col-md-6"><label class="form-label">Requisito (ID opcional)</label><input class="form-control" name="requisitoId" placeholder="ID Mongo"/></div>
              <div class="col-md-6"><label class="form-label">Prioridad</label>
                <select class="form-select" name="prioridad"><option>ALTA</option><option>MEDIA</option><option>BAJA</option></select></div>
              <div class="col-md-6"><label class="form-label">Tipo</label>
                <select class="form-select" name="tipo"><option>FUNCIONAL</option><option>REGRESION</option><option>HUMO</option><option>RENDIMIENTO</option></select></div>
              <div class="col-md-6"><label class="form-label">Estado</label>
                <select class="form-select" name="estado"><option>PENDIENTE</option><option>EJECUTADO</option><option>BLOQUEADO</option></select></div>
              <div class="col-12"><label class="form-label">Precondiciones</label><textarea class="form-control" name="precondiciones" rows="2"></textarea></div>
              <div class="col-12"><label class="form-label">Resultado esperado</label><textarea class="form-control" name="resultadoEsperado" rows="2"></textarea></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
