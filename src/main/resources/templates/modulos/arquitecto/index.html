<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Arquitectura · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h5 mb-1"><i class="bi bi-layers me-2 text-primary"></i>Arquitectura de software</h1>
    <p class="text-muted small mb-4">ADR y diagramas técnicos por proyecto.</p>
    <div class="row g-3">
      <div class="col-md-4" th:each="p : ${proyectos}">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h2 class="h6 mb-1" th:text="${p.nombre}">Proyecto</h2>
            <div class="d-flex flex-column gap-2 mt-2">
              <a class="btn btn-outline-primary btn-sm" th:href="@{/arquitectura/{id}/adrs(id=${p.id})}"><i class="bi bi-journal-text me-1"></i>ADRs</a>
              <a class="btn btn-outline-secondary btn-sm" th:href="@{/arquitectura/{id}/diagramas(id=${p.id})}"><i class="bi bi-bezier2 me-1"></i>Diagramas</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
