<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|Casos de uso · ${proyecto.nombre}|">Casos de uso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/analista}">Analista</a></li>
        <li class="breadcrumb-item active" th:text="${proyecto.nombre}"></li>
      </ol>
    </nav>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h5 mb-0"><i class="bi bi-diagram-2 me-2 text-primary"></i>Casos de uso</h1>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCu"><i class="bi bi-plus-circle-fill me-1"></i>Nuevo</button>
    </div>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><i class="bi bi-check-circle me-1"></i><span th:text="${ok}"></span></div>

    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0 align-middle">
        <thead class="table-light"><tr><th>Código</th><th>Nombre</th><th>Actor</th><th></th></tr></thead>
        <tbody>
          <tr th:each="c : ${casosUso}">
            <td><code th:text="${c.codigo}">CU-01</code></td>
            <td th:text="${c.nombre}">Nombre</td>
            <td th:text="${c.actor}">Actor</td>
            <td><button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal"
                        th:attr="data-bs-target='#det'+${c.id}">Ver</button></td>
          </tr>
          <tr th:if="${casosUso.isEmpty()}"><td colspan="4" class="text-center text-muted py-3 small">Sin casos de uso.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="modal fade" id="modalCu" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form th:action="@{/analista/{id}/casos-uso(id=${proyecto.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="modal-header"><h5 class="modal-title">Nuevo caso de uso</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body row g-2">
              <div class="col-md-3"><label class="form-label">Código</label><input class="form-control" name="codigo" required/></div>
              <div class="col-md-9"><label class="form-label">Nombre</label><input class="form-control" name="nombre" required/></div>
              <div class="col-12"><label class="form-label">Actor</label><input class="form-control" name="actor"/></div>
              <div class="col-12"><label class="form-label">Flujo básico</label><textarea class="form-control" name="flujoBasico" rows="3"></textarea></div>
              <div class="col-12"><label class="form-label">Flujos alternos</label><textarea class="form-control" name="flujosAlternos" rows="2"></textarea></div>
              <div class="col-md-6"><label class="form-label">Precondiciones</label><textarea class="form-control" name="precondiciones" rows="2"></textarea></div>
              <div class="col-md-6"><label class="form-label">Postcondiciones</label><textarea class="form-control" name="postcondiciones" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div th:each="c : ${casosUso}" class="modal fade" tabindex="-1" th:id="|det${c.id}|">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title" th:text="${c.nombre}">CU</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body small">
            <p><strong>Flujo básico:</strong> <span th:text="${c.flujoBasico}"></span></p>
            <p><strong>Alternos:</strong> <span th:text="${c.flujosAlternos}"></span></p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
