<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Sprints</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h4">Sprints</h1>
    <p class="text-muted">Planificación de iteraciones por proyecto.</p>
    <div class="alert alert-success py-2" th:if="${msg}" th:text="${msg}"></div>

    <form class="card p-3 mb-4 shadow-sm" method="get" th:action="@{/sprints}">
      <label class="form-label">Proyecto</label>
      <select name="proyectoId" class="form-select" onchange="this.form.submit()">
        <option value="">— Seleccione —</option>
        <option th:each="p : ${proyectos}" th:value="${p.id}" th:selected="${proyectoId == p.id}" th:text="${p.nombre}"></option>
      </select>
    </form>

    <th:block th:if="${proyectoId != null and !proyectoId.isEmpty()}">
      <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Sprint</div>
        <div class="card-body">
          <form th:action="@{/sprints/guardar}" th:object="${sprint}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{proyectoId}" />
            <div class="row g-2">
              <div class="col-md-2"><label class="form-label">Número</label><input type="number" class="form-control" th:field="*{numero}" required/></div>
              <div class="col-md-10"><label class="form-label">Objetivo</label><input class="form-control" th:field="*{objetivo}"/></div>
              <div class="col-md-4"><label class="form-label">Inicio</label><input type="date" class="form-control" th:field="*{fechaInicio}"/></div>
              <div class="col-md-4"><label class="form-label">Fin</label><input type="date" class="form-control" th:field="*{fechaFin}"/></div>
              <div class="col-md-2"><label class="form-label">Cap. horas</label><input type="number" class="form-control" th:field="*{capacidadHoras}"/></div>
              <div class="col-md-2"><label class="form-label">Estado</label><input class="form-control" th:field="*{estado}"/></div>
            </div>
            <button type="submit" class="btn btn-primary btn-sm mt-2">Guardar sprint</button>
            <a th:if="${sprint.id != null}" th:href="@{/sprints(proyectoId=${proyectoId})}" class="btn btn-outline-secondary btn-sm mt-2 ms-1">Nuevo</a>
          </form>
        </div>
      </div>

      <div class="table-responsive card shadow-sm">
        <table class="table mb-0">
          <thead><tr><th>#</th><th>Objetivo</th><th>Inicio</th><th>Fin</th><th>Estado</th><th></th></tr></thead>
          <tbody>
          <tr th:each="s : ${sprints}">
            <td th:text="${s.numero}">1</td>
            <td th:text="${s.objetivo}">—</td>
            <td th:text="${s.fechaInicio}">—</td>
            <td th:text="${s.fechaFin}">—</td>
            <td th:text="${s.estado}">—</td>
            <td class="text-end text-nowrap">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/sprints(proyectoId=${proyectoId},editSprint=${s.id})}">Editar</a>
              <form th:action="@{|/sprints/${s.id}/eliminar|}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="proyectoId" th:value="${proyectoId}" />
                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </th:block>
  </main>
</div>
</body>
</html>
