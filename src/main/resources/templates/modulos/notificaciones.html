<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Notificaciones · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h5 mb-4"><i class="bi bi-bell me-2 text-primary"></i>Notificaciones</h1>
    <div class="list-group shadow-sm">
      <div th:each="n : ${items}" class="list-group-item" th:classappend="${n.leida != null and !n.leida} ? ' list-group-item-light' : ''">
        <div class="d-flex justify-content-between">
          <strong th:text="${n.titulo}">Título</strong>
          <small class="text-muted" th:text="${n.fecha}">fecha</small>
        </div>
        <p class="mb-0 small" th:text="${n.mensaje}">Mensaje</p>
      </div>
      <div th:if="${items == null or items.isEmpty()}" class="list-group-item text-muted small">No hay notificaciones.</div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
