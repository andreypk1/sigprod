<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Usuarios · Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <div class="alert alert-success" th:if="${msg}" th:text="${msg}"></div>
    <h1 class="h4 mb-3">Usuarios</h1>
    <div class="table-responsive card shadow-sm">
      <table class="table mb-0 align-middle">
        <thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th></th></tr></thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
          <td th:text="${u.nombreCompleto()}">Nombre</td>
          <td th:text="${u.correo}">mail</td>
          <td>
            <form th:action="@{|/admin/usuarios/${u.id}/rol|}" method="post" class="d-flex gap-2">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <select class="form-select form-select-sm" name="rol">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${u.rol != null and r.name() == u.rol.name()}"></option>
              </select>
              <button class="btn btn-sm btn-outline-primary" type="submit">Guardar</button>
            </form>
          </td>
          <td>
            <form th:action="@{|/admin/usuarios/${u.id}/estado|}" method="post" class="d-flex gap-2">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <select class="form-select form-select-sm" name="estado">
                <option value="ACTIVO" th:selected="${u.estado == 'ACTIVO'}">ACTIVO</option>
                <option value="INACTIVO" th:selected="${u.estado == 'INACTIVO'}">INACTIVO</option>
                <option value="PENDIENTE" th:selected="${u.estado == 'PENDIENTE'}">PENDIENTE</option>
              </select>
              <button class="btn btn-sm btn-outline-secondary" type="submit">Cambiar</button>
            </form>
          </td>
          <td></td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
