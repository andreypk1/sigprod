<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Clientes · Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <div class="alert alert-success" th:if="${msg}" th:text="${msg}"></div>
    <h1 class="h4 mb-3">Clientes</h1>
    <p class="small mb-3" th:if="${editando}">
      <span class="text-muted">Modo edición.</span>
      <a th:href="@{/admin/clientes}">Cancelar y crear nuevo</a>
    </p>
    <form class="card p-3 mb-4 shadow-sm" th:action="@{/admin/clientes}" th:object="${cliente}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" th:field="*{id}" />
      <div class="row g-2">
        <div class="col-md-6"><label class="form-label">Razón social</label><input class="form-control" th:field="*{razonSocial}" required/></div>
        <div class="col-md-3"><label class="form-label">NIT</label><input class="form-control" th:field="*{nit}"/></div>
        <div class="col-md-3"><label class="form-label">Contacto</label><input class="form-control" th:field="*{contactoPrincipal}"/></div>
        <div class="col-md-4"><label class="form-label">Correo</label><input class="form-control" th:field="*{correo}" type="email"/></div>
        <div class="col-md-4"><label class="form-label">Teléfono</label><input class="form-control" th:field="*{telefono}"/></div>
        <div class="col-md-2"><label class="form-label">Ciudad</label><input class="form-control" th:field="*{ciudad}"/></div>
        <div class="col-md-2"><label class="form-label">País</label><input class="form-control" th:field="*{pais}"/></div>
      </div>
      <button class="btn btn-primary mt-2" type="submit" th:text="${editando} ? 'Actualizar cliente' : 'Crear cliente'">Guardar</button>
    </form>

    <div class="table-responsive card shadow-sm">
      <table class="table mb-0">
        <thead><tr><th>Razón social</th><th>NIT</th><th>Ciudad</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="c : ${clientes}">
          <td th:text="${c.razonSocial}">Empresa</td>
          <td th:text="${c.nit}">-</td>
          <td th:text="${c.ciudad}">BOG</td>
          <td class="text-end text-nowrap" th:with="cid=${c.id}">
            <th:block th:if="${cid != null and !#strings.isEmpty(cid)}">
              <a class="btn btn-sm btn-outline-primary me-1" th:href="@{|/admin/clientes/${cid}/editar|}">Editar</a>
              <form th:action="@{|/admin/clientes/${cid}/eliminar|}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar</button>
              </form>
            </th:block>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
