<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
  <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(90deg,#1a237e,#1565c0);">
    <div class="container-fluid">
      <button type="button" id="btnSidebarToggle" class="btn btn-link text-white nav-link p-1 me-1 d-none d-lg-inline-flex" aria-label="Alternar menú lateral">
        <i class="bi bi-list fs-4" id="sidebarIconOpen"></i>
        <i class="bi bi-x-lg fs-4 d-none" id="sidebarIconClose"></i>
      </button>
      <button type="button" id="btnMobileSidebar" class="btn btn-link text-white p-1 d-lg-none" aria-label="Menú lateral">
        <i class="bi bi-list fs-3"></i>
      </button>
      <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" th:href="@{/dashboard}">
        <i class="bi bi-diagram-3-fill brand-icon fs-4"></i><span>SIGPROD</span>
      </a>
      <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <form class="d-none d-md-flex mx-auto my-2 my-lg-0" role="search" th:action="@{/proyectos}" method="get"
              sec:authorize="hasAnyRole('ADMINISTRADOR','PROJECT_MANAGER','PRODUCT_OWNER')">
          <div class="input-group input-group-sm" style="max-width: 420px;">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="search" name="nombre" class="form-control border-start-0" placeholder="Buscar proyecto..." aria-label="Búsqueda global"/>
          </div>
        </form>
        <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
          <li class="nav-item" sec:authorize="isAuthenticated()">
            <a class="nav-link position-relative text-white py-2" th:href="@{/notificaciones}">
              <i class="bi bi-bell-fill fs-5"></i>
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    id="navNotifBadge" style="font-size:.6rem; display:none;">0</span>
            </a>
          </li>
          <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
            <button type="button" class="nav-link dropdown-toggle d-flex align-items-center gap-2 py-2 btn btn-link text-white text-decoration-none border-0"
                    data-bs-toggle="dropdown" aria-expanded="false" id="navbarUserMenu">
              <th:block th:with="u=${#authentication.principal.usuario}">
                <img th:if="${u.fotoUrl != null and !u.fotoUrl.isBlank()}" class="rounded-circle" style="width:36px;height:36px;object-fit:cover;"
                     th:src="${u.fotoUrl}" alt=""/>
                <i th:unless="${u.fotoUrl != null and !u.fotoUrl.isBlank()}" class="bi bi-person-circle fs-3 lh-1"></i>
              </th:block>
              <span th:text="${nombreUsuario != null ? nombreUsuario : #authentication.name}">Usuario</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><span class="dropdown-item-text small text-muted" sec:authentication="principal.usuario.rol"></span></li>
              <li><a class="dropdown-item" th:href="@{/dashboard}"><i class="bi bi-person-lines-fill me-2"></i>Mi Perfil</a></li>
              <li><a class="dropdown-item" th:href="@{/perfil/cambiar-password}">
                <i class="bi bi-shield-lock-fill me-2"></i>Cambiar contraseña</a></li>
              <li><hr class="dropdown-divider"/></li>
              <li>
                <form th:action="@{/logout}" method="post" class="px-3 mb-0">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <button type="submit" class="btn btn-link dropdown-item text-danger p-0 text-start">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                  </button>
                </form>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
    <script>
      (function () {
        var btn = document.getElementById('btnSidebarToggle');
        var sb = document.querySelector('.sidebar-app');
        var o = document.getElementById('sidebarIconOpen');
        var c = document.getElementById('sidebarIconClose');
        function desktopToggle() {
          if (!sb || !btn || window.innerWidth < 992) return;
          sb.classList.toggle('sidebar-collapsed');
          if (o && c) {
            o.classList.toggle('d-none', sb.classList.contains('sidebar-collapsed'));
            c.classList.toggle('d-none', !sb.classList.contains('sidebar-collapsed'));
          }
        }
        if (btn) btn.addEventListener('click', desktopToggle);
        var m = document.getElementById('btnMobileSidebar');
        function syncMobileBodyLock() {
          if (!sb || window.innerWidth >= 992) {
            document.body.classList.remove('sidebar-open-lock');
            return;
          }
          document.body.classList.toggle('sidebar-open-lock', sb.classList.contains('sidebar-open'));
        }
        if (m && sb) {
          m.addEventListener('click', function () {
            sb.classList.toggle('sidebar-open');
            syncMobileBodyLock();
          });
        }
        window.addEventListener('resize', function () {
          if (window.innerWidth >= 992 && sb) {
            sb.classList.remove('sidebar-open');
            document.body.classList.remove('sidebar-open-lock');
          }
        });
      })();
      (function() {
        fetch('/api/notificaciones/no-leidas-count', { credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (data && data.count > 0) {
              var badge = document.getElementById('navNotifBadge');
              if (badge) { badge.textContent = data.count; badge.style.display = ''; }
            }
          }).catch(function() {});
      })();
    </script>
  </nav>
</body>
</html>
