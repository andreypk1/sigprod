<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Nuevo proyecto · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h4 mb-3">Nuevo proyecto</h1>
    <div class="alert alert-danger" th:if="${errorGlobal != null}" th:text="${errorGlobal}"></div>
    <form th:action="@{/proyectos/nuevo}" th:object="${proyectoForm}" method="post" class="card shadow-sm p-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Nombre</label>
          <input class="form-control" th:field="*{nombre}" required/>
        </div>
        <div class="col-md-12">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cliente</label>
          <select class="form-select" th:field="*{clienteId}" required>
            <option value="">Seleccione...</option>
            <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.razonSocial}"></option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Metodología</label>
          <select class="form-select" th:field="*{metodologia}">
            <option value="SCRUM">SCRUM</option>
            <option value="KANBAN">KANBAN</option>
            <option value="CASCADA">CASCADA</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Fecha inicio</label>
          <input type="date" class="form-control" th:field="*{fechaInicio}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Fecha fin</label>
          <input type="date" class="form-control" th:field="*{fechaFin}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Presupuesto</label>
          <input type="number" step="0.01" class="form-control" th:field="*{presupuesto}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Product Owner</label>
          <select class="form-select" th:field="*{productOwnerId}" id="poSelect" required>
            <option value="">Seleccione...</option>
            <option th:each="u : ${productOwners}" th:value="${u.id}" th:text="${u.nombreCompleto()}"></option>
          </select>
          <div class="small text-muted mt-1" id="poDetalle"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Project Manager</label>
          <select class="form-select" th:field="*{projectManagerId}" required>
            <option value="">Seleccione...</option>
            <option th:each="u : ${projectManagers}" th:value="${u.id}" th:text="${u.nombreCompleto()}"></option>
          </select>
        </div>
      </div>

      <hr class="my-4"/>
      <h2 class="h6">Miembros del equipo (opcional)</h2>
      <div class="row g-2">
        <div class="col-md-4" th:each="idx : ${#numbers.sequence(0,2)}">
          <div class="border rounded p-2">
            <select class="form-select form-select-sm" th:field="*{miembros[__${idx}__].usuarioId}">
              <option value="">Usuario</option>
              <option th:each="u : ${usuariosTodos}" th:value="${u.id}"
                      th:text="|${u.nombreCompleto()} (${u.rol})|"></option>
            </select>
            <div class="input-group input-group-sm mt-1">
              <span class="input-group-text">%</span>
              <input type="number" class="form-control" th:field="*{miembros[__${idx}__].porcentajeDedicacion}" placeholder="Dedicación"/>
              <input type="number" step="0.01" class="form-control" th:field="*{miembros[__${idx}__].tarifaHora}" placeholder="Tarifa/h"/>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-primary mt-3" type="submit">Guardar proyecto</button>
      <a class="btn btn-link mt-3" th:href="@{/proyectos}">Cancelar</a>
    </form>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const po = document.getElementById('poSelect');
  const det = document.getElementById('poDetalle');
  po?.addEventListener('change', async () => {
    det.textContent = '';
    if (!po.value) return;
    const r = await fetch('/api/usuarios/' + po.value);
    if (r.ok) {
      const u = await r.json();
      det.textContent = (u.correo || '') + ' · ' + (u.telefono || '');
    }
  });
</script>
</body>
</html>
