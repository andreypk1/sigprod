<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Proyectos · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h1 class="h4 mb-0">Proyectos</h1>
      <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-success btn-sm"
           th:href="@{/exportar/proyectos/csv}"
           sec:authorize="hasAnyRole('ADMINISTRADOR','PROJECT_MANAGER')">
          <i class="bi bi-file-earmark-excel-fill me-1"></i>Exportar CSV
        </a>
        <a class="btn btn-primary" sec:authorize="hasAnyRole('ADMINISTRADOR','PROJECT_MANAGER','PRODUCT_OWNER')" th:href="@{/proyectos/nuevo}">
          <i class="bi bi-plus-lg"></i> Nuevo Proyecto
        </a>
      </div>
    </div>
    <form class="row g-2 mb-3" method="get">
      <div class="col-md-3">
        <input class="form-control" name="nombre" placeholder="Buscar nombre" th:value="${filtroNombre}"/>
      </div>
      <div class="col-md-3">
        <select class="form-select" name="estado">
          <option value="">Estado (todos)</option>
          <option value="ACTIVO" th:selected="${filtroEstado == 'ACTIVO'}">ACTIVO</option>
          <option value="PAUSADO" th:selected="${filtroEstado == 'PAUSADO'}">PAUSADO</option>
          <option value="FINALIZADO" th:selected="${filtroEstado == 'FINALIZADO'}">FINALIZADO</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" name="metodologia">
          <option value="">Metodología</option>
          <option value="SCRUM" th:selected="${filtroMetodologia == 'SCRUM'}">SCRUM</option>
          <option value="KANBAN" th:selected="${filtroMetodologia == 'KANBAN'}">KANBAN</option>
          <option value="CASCADA" th:selected="${filtroMetodologia == 'CASCADA'}">CASCADA</option>
        </select>
      </div>
      <div class="col-md-3">
        <button class="btn btn-outline-secondary" type="submit">Filtrar</button>
      </div>
    </form>
    <div class="table-responsive card shadow-sm">
      <table class="table mb-0 align-middle">
        <thead class="table-light">
        <tr>
          <th>Nombre</th><th>Cliente</th><th>Metodología</th><th>PO</th><th>PM</th><th>Progreso</th><th>Estado</th><th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${proyectos}">
          <td th:text="${p.nombre}">Nombre</td>
          <td th:text="${p.clienteNombre}">Cliente</td>
          <td th:text="${p.metodologia}">SCRUM</td>
          <td th:text="${p.productOwnerNombre}">PO</td>
          <td th:text="${p.projectManagerNombre}">PM</td>
          <td style="min-width:140px">
            <div class="progress" style="height:8px;">
              <div class="progress-bar" th:style="|width:${progresoPorProyecto.get(p.id)}%|"></div>
            </div>
            <small th:text="|${progresoPorProyecto.get(p.id)} %|">0%</small>
          </td>
          <td><span class="badge bg-success" th:text="${p.estado}">ACTIVO</span></td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-primary" th:href="@{/proyectos/{id}(id=${p.id})}">Ver</a>
            <a class="btn btn-sm btn-outline-secondary" th:href="@{/kanban/{id}(id=${p.id})}">Kanban</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
