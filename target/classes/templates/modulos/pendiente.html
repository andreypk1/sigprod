<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${tituloModulo + ' · SIGPROD'}">Módulo · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-3 p-md-4 main-content-area">
    <div class="content-max mx-auto">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb small mb-2">
          <li class="breadcrumb-item"><a th:href="@{/dashboard}">Inicio</a></li>
          <li class="breadcrumb-item active" aria-current="page">Módulo</li>
        </ol>
      </nav>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="display-4 text-primary mb-3"><i class="bi bi-tools"></i></div>
          <h1 class="h4 mb-2" th:text="${tituloModulo}">Título</h1>
          <p class="text-muted mb-0">
            Esta sección está en preparación. La navegación desde el menú lateral funciona correctamente;
            aquí se integrará la funcionalidad definitiva.
          </p>
          <p class="small text-muted mt-3 mb-0 font-monospace" th:text="'codigo=' + ${codigoModulo}">codigo=</p>
          <a class="btn btn-outline-primary mt-4" th:href="@{/dashboard}"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
