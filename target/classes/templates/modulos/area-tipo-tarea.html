<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${areaNombre}">Área</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h4" th:text="${areaNombre}">Área</h1>
    <p class="text-muted">Tareas con tipo <strong th:text="${tipoFijo}">TIPO</strong>. Kanban: <a th:href="@{/kanban/{id}(id=${proyectoId})}" th:if="${proyectoId}">abrir tablero</a>.</p>
    <div class="alert alert-success py-2" th:if="${msg}" th:text="${msg}"></div>
    <div class="alert alert-danger py-2" th:if="${msgError}" th:text="${msgError}"></div>

    <form class="card p-3 mb-4 shadow-sm" method="get">
      <label class="form-label">Proyecto</label>
      <select name="proyectoId" class="form-select" onchange="this.form.submit()">
        <option value="">— Seleccione —</option>
        <option th:each="p : ${proyectos}" th:value="${p.id}" th:selected="${proyectoId == p.id}" th:text="${p.nombre}"></option>
      </select>
    </form>

    <th:block th:if="${proyectoId != null and !proyectoId.isEmpty()}">
      <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Tarea</div>
        <div class="card-body">
          <form th:action="@{|/${areaSegment}/guardar|}" th:object="${tareaDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="tareaEditId" th:value="${tareaEditId}" />
            <input type="hidden" th:field="*{proyectoId}" />
            <input type="hidden" th:field="*{tipo}" />
            <div class="mb-2"><label class="form-label">Título</label><input class="form-control" th:field="*{titulo}" required/></div>
            <div class="mb-2"><label class="form-label">Descripción</label><textarea class="form-control" th:field="*{descripcion}" rows="2"></textarea></div>
            <div class="row g-2">
              <div class="col-md-6"><label class="form-label">Historia</label>
                <select class="form-select" th:field="*{historiaId}">
                  <option value="">—</option>
                  <option th:each="h : ${historiasSelect}" th:value="${h.id}" th:text="${h.titulo}"></option>
                </select>
              </div>
              <div class="col-md-6"><label class="form-label">Sprint</label>
                <select class="form-select" th:field="*{sprintId}">
                  <option value="">—</option>
                  <option th:each="s : ${sprintsSelect}" th:value="${s.id}" th:text="|Sprint ${s.numero}|"></option>
                </select>
              </div>
              <div class="col-md-4"><label class="form-label">Estado</label>
                <select class="form-select" th:field="*{estado}">
                  <option value="">—</option>
                  <option th:each="es : ${estados}" th:value="${es}" th:text="${es}"></option>
                </select>
              </div>
              <div class="col-md-4"><label class="form-label">Prioridad</label><input class="form-control" th:field="*{prioridad}"/></div>
              <div class="col-md-4"><label class="form-label">Asignado (id)</label><input class="form-control" th:field="*{asignadoId}"/></div>
              <div class="col-md-4"><label class="form-label">Horas est.</label><input type="number" step="0.5" class="form-control" th:field="*{horasEstimadas}"/></div>
              <div class="col-md-4"><label class="form-label">Horas reales</label><input type="number" step="0.5" class="form-control" th:field="*{horasReales}"/></div>
              <div class="col-md-4"><label class="form-label">Fecha límite</label><input type="date" class="form-control" th:field="*{fechaLimite}"/></div>
            </div>
            <button type="submit" class="btn btn-primary btn-sm mt-2">Guardar</button>
            <a th:if="${tareaEditId != null}" th:href="@{|/${areaSegment}?proyectoId=${proyectoId}|}" class="btn btn-outline-secondary btn-sm mt-2 ms-1">Nueva</a>
          </form>
        </div>
      </div>

      <div class="table-responsive card shadow-sm">
        <table class="table mb-0 table-sm">
          <thead><tr><th>Título</th><th>Estado</th><th></th></tr></thead>
          <tbody>
          <tr th:each="t : ${tareas}">
            <td th:text="${t.titulo}">—</td>
            <td th:text="${t.estado}">—</td>
            <td class="text-end text-nowrap">
              <a class="btn btn-sm btn-outline-primary" th:href="@{|/${areaSegment}?proyectoId=${proyectoId}&editTarea=${t.id}|}">Editar</a>
              <form th:action="@{|/${areaSegment}/tarea/${t.id}/eliminar|}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="proyectoId" th:value="${proyectoId}" />
                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </th:block>
  </main>
</div>
</body>
</html>
