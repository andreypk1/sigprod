<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|ADRs · ${proyecto.nombre}|">ADRs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/arquitectura}">Arquitectura</a></li>
        <li class="breadcrumb-item active" th:text="${proyecto.nombre}"></li>
      </ol>
    </nav>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h5 mb-0"><i class="bi bi-journal-text me-2 text-primary"></i>Architecture Decision Records</h1>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalAdr"><i class="bi bi-plus-circle-fill me-1"></i>Nuevo ADR</button>
    </div>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><i class="bi bi-check-circle me-1"></i><span th:text="${ok}"></span></div>

    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0 align-middle">
        <thead class="table-light">
          <tr><th>N°</th><th>Título</th><th>Estado</th><th>Fecha</th><th>Decisión</th><th></th></tr>
        </thead>
        <tbody>
          <tr th:each="a : ${adrs}">
            <td th:text="${a.numero}">1</td>
            <td th:text="${a.titulo}">Título</td>
            <td>
              <span class="badge bg-warning text-dark" th:if="${a.estado == 'PROPUESTA'}">PROPUESTA</span>
              <span class="badge bg-success" th:if="${a.estado == 'ACEPTADA'}">ACEPTADA</span>
              <span class="badge bg-secondary" th:if="${a.estado == 'OBSOLETA'}">OBSOLETA</span>
              <span class="badge bg-light text-dark" th:if="${a.estado != null and a.estado != 'PROPUESTA' and a.estado != 'ACEPTADA' and a.estado != 'OBSOLETA'}" th:text="${a.estado}"></span>
            </td>
            <td th:text="${a.fecha}">—</td>
            <td class="small text-truncate" style="max-width:220px" th:text="${a.decision}">dec</td>
            <td>
              <a class="btn btn-outline-danger btn-sm" th:href="@{/arquitectura/{pid}/adrs/{id}/eliminar(pid=${proyecto.id},id=${a.id})}">
                <i class="bi bi-trash3-fill"></i>
              </a>
            </td>
          </tr>
          <tr th:if="${adrs.isEmpty()}"><td colspan="6" class="text-center text-muted py-3 small">Sin ADRs.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="modal fade" id="modalAdr" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form th:action="@{/arquitectura/{id}/adrs(id=${proyecto.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="modal-header"><h5 class="modal-title">Nuevo ADR</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body row g-2">
              <div class="col-12"><label class="form-label">Título</label><input class="form-control" name="titulo" required/></div>
              <div class="col-12"><label class="form-label">Contexto</label><textarea class="form-control" name="contexto" rows="3"></textarea></div>
              <div class="col-12"><label class="form-label">Decisión</label><textarea class="form-control" name="decision" rows="3"></textarea></div>
              <div class="col-md-6"><label class="form-label">Consecuencias</label><textarea class="form-control" name="consecuencias" rows="2"></textarea></div>
              <div class="col-md-6"><label class="form-label">Alternativas</label><textarea class="form-control" name="alternativas" rows="2"></textarea></div>
              <div class="col-md-4"><label class="form-label">Estado</label>
                <select class="form-select" name="estado"><option>PROPUESTA</option><option>ACEPTADA</option><option>OBSOLETA</option></select></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
