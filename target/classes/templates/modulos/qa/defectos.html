<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|Defectos · ${proyecto.nombre}|">Defectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/qa}">QA</a></li><li class="breadcrumb-item active" th:text="${proyecto.nombre}"></li></ol>
    </nav>
    <div class="d-flex justify-content-between mb-3">
      <h1 class="h5 mb-0">Defectos</h1>
      <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalDef"><i class="bi bi-plus-circle-fill me-1"></i>Registrar defecto</button>
    </div>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><span th:text="${ok}"></span></div>
    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0 align-middle">
        <thead class="table-light"><tr><th>Título</th><th>Severidad</th><th>Estado</th></tr></thead>
        <tbody>
          <tr th:each="d : ${defectos}">
            <td th:text="${d.titulo}">Def</td>
            <td><span class="badge bg-danger" th:text="${d.severidad}">ALTA</span></td>
            <td th:text="${d.estado}">ABIERTO</td>
          </tr>
          <tr th:if="${defectos.isEmpty()}"><td colspan="3" class="text-center text-muted py-3 small">Sin defectos registrados.</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal fade" id="modalDef" tabindex="-1">
      <div class="modal-dialog">
        <form th:action="@{/qa/{id}/defectos(id=${proyecto.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nuevo defecto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
              <label class="form-label">Título</label><input class="form-control mb-2" name="titulo" required/>
              <label class="form-label">Descripción</label><textarea class="form-control mb-2" name="descripcion" rows="3"></textarea>
              <label class="form-label">Severidad</label>
              <select class="form-select mb-2" name="severidad"><option>BAJA</option><option>MEDIA</option><option>ALTA</option><option>CRITICA</option></select>
              <label class="form-label">Estado</label>
              <select class="form-select" name="estado"><option>NUEVO</option><option>ASIGNADO</option><option>EN_DESARROLLO</option><option>CERRADO</option></select>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
