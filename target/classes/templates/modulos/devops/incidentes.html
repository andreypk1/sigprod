<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|Incidentes · ${proyecto.nombre}|">Incidentes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/devops}">DevOps</a></li><li class="breadcrumb-item active" th:text="${proyecto.nombre}"></li></ol></nav>
    <div class="d-flex justify-content-between mb-3"><h1 class="h5 mb-0">Incidentes</h1>
      <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalInc"><i class="bi bi-plus-circle-fill me-1"></i>Registrar</button></div>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><span th:text="${ok}"></span></div>
    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0"><thead class="table-light"><tr><th>Título</th><th>Severidad</th><th>Estado</th><th>Reporte</th></tr></thead>
        <tbody>
          <tr th:each="i : ${incidentes}">
            <td th:text="${i.titulo}">Inc</td>
            <td><span class="badge bg-danger" th:text="${i.severidad}">ALTA</span></td>
            <td th:text="${i.estado}">ABIERTO</td>
            <td class="small" th:text="${i.fechaReporte}">—</td>
          </tr>
          <tr th:if="${incidentes.isEmpty()}"><td colspan="4" class="text-center text-muted py-3 small">Sin incidentes.</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal fade" id="modalInc" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <form th:action="@{/devops/{id}/incidentes(id=${proyecto.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Incidente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body row g-2">
              <div class="col-12"><label class="form-label">Título</label><input class="form-control" name="titulo" required/></div>
              <div class="col-12"><label class="form-label">Descripción</label><textarea class="form-control" name="descripcion" rows="3"></textarea></div>
              <div class="col-md-4"><label class="form-label">Severidad</label>
                <select class="form-select" name="severidad"><option>BAJA</option><option>MEDIA</option><option>ALTA</option><option>CRITICA</option></select></div>
              <div class="col-md-4"><label class="form-label">Estado</label>
                <select class="form-select" name="estado"><option>ABIERTO</option><option>EN_INVESTIGACION</option><option>RESUELTO</option><option>CERRADO</option></select></div>
              <div class="col-md-4"><label class="form-label">Responsable (ID usuario)</label><input class="form-control" name="responsableId"/></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
