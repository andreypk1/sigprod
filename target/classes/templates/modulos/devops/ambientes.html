<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="|Ambientes · ${proyecto.nombre}|">Ambientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/devops}">DevOps</a></li><li class="breadcrumb-item active" th:text="${proyecto.nombre}"></li></ol></nav>
    <h1 class="h5 mb-3">Ambientes</h1>
    <div class="alert alert-success py-2 small" th:if="${ok != null}"><span th:text="${ok}"></span></div>

    <div class="row g-2 mb-4">
      <div class="col-6 col-md-3">
        <div class="card h-100 border-success border-2"><div class="card-body py-3 text-center small"><strong>DEV</strong><div class="text-muted">Referencia estándar</div></div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-warning border-2"><div class="card-body py-3 text-center small"><strong>TEST</strong><div class="text-muted">Integración</div></div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-primary border-2"><div class="card-body py-3 text-center small"><strong>STAGING</strong><div class="text-muted">Pre-producción</div></div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-danger border-2"><div class="card-body py-3 text-center small"><strong>PROD</strong><div class="text-muted">Productivo</div></div></div>
      </div>
    </div>

    <div class="d-flex justify-content-between mb-2">
      <span class="small text-muted">Registro en base de datos</span>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalAmb"><i class="bi bi-plus-circle-fill me-1"></i>Nuevo ambiente</button>
    </div>
    <div class="table-responsive card shadow-sm">
      <table class="table table-sm mb-0 align-middle">
        <thead class="table-light"><tr><th>Nombre</th><th>URL</th><th>Estado</th><th>Último despliegue</th></tr></thead>
        <tbody>
          <tr th:each="a : ${ambientes}">
            <td th:text="${a.nombre}">DEV</td>
            <td class="small"><a th:href="${a.url}" th:text="${a.url}" target="_blank" rel="noopener"></a></td>
            <td>
              <span class="badge bg-success" th:if="${a.estado == 'ACTIVO'}">ACTIVO</span>
              <span class="badge bg-warning text-dark" th:if="${a.estado == 'MANTENIMIENTO'}">MANTENIMIENTO</span>
              <span class="badge bg-danger" th:if="${a.estado == 'INACTIVO'}">INACTIVO</span>
              <span class="badge bg-secondary" th:if="${a.estado != null and a.estado != 'ACTIVO' and a.estado != 'MANTENIMIENTO' and a.estado != 'INACTIVO'}" th:text="${a.estado}"></span>
            </td>
            <td class="small" th:text="${a.ultimoDespliegue}">—</td>
          </tr>
          <tr th:if="${ambientes.isEmpty()}"><td colspan="4" class="text-center text-muted py-3 small">Sin ambientes registrados.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="modal fade" id="modalAmb" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <form th:action="@{/devops/{id}/ambientes(id=${proyecto.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Ambiente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body row g-2">
              <div class="col-md-4"><label class="form-label">Nombre</label>
                <select class="form-select" name="nombre"><option>DEV</option><option>TEST</option><option>STAGING</option><option>PROD</option></select></div>
              <div class="col-md-8"><label class="form-label">URL</label><input class="form-control" name="url" placeholder="https://"/></div>
              <div class="col-12"><label class="form-label">Configuración (JSON)</label><textarea class="form-control font-monospace small" name="configuracionJson" rows="3"></textarea></div>
              <div class="col-md-4"><label class="form-label">Estado</label>
                <select class="form-select" name="estado"><option>ACTIVO</option><option>INACTIVO</option><option>MANTENIMIENTO</option></select></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
