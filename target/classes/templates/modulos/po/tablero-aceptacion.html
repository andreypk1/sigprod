<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Tablero de Aceptación · SIGPROD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/sigprod.css}"/>
</head>
<body class="bg-app d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="d-flex flex-grow-1 app-shell min-vh-0">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="flex-grow-1 p-4">
    <h1 class="h5 mb-1"><i class="bi bi-patch-check me-2 text-primary"></i>Tablero de Aceptación</h1>
    <p class="text-muted small mb-4">Historias de usuario en revisión pendientes de tu aprobación como Product Owner.</p>

    <div class="alert alert-success py-2 small" th:if="${ok != null}">
      <i class="bi bi-check-circle me-1"></i><span th:text="${ok}"></span>
    </div>

    <div class="alert alert-info py-3 small" th:if="${historias == null or #lists.isEmpty(historias)}">
      <i class="bi bi-info-circle me-2"></i>No hay historias de usuario pendientes de aceptación en este momento.
    </div>

    <div class="row g-3">
      <div class="col-lg-6" th:each="h : ${historias}">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center py-2">
            <span class="fw-semibold" th:text="${h.titulo}">Historia</span>
            <span class="badge bg-info text-dark" th:text="${h.prioridadMoscow}">MUST</span>
          </div>
          <div class="card-body py-2">
            <p class="small text-muted mb-2" th:text="${h.narrativa}">Narrativa</p>
            <div class="d-flex flex-column gap-1 mb-2" th:if="${h.criteriosAceptacion != null and !h.criteriosAceptacion.isEmpty()}">
              <div class="small fw-semibold">Criterios:</div>
              <div th:each="c : ${h.criteriosAceptacion}" class="small">
                <span class="badge bg-secondary me-1" th:text="${c.tipo}">GIVEN</span>
                <span th:text="${c.descripcion}">desc</span>
              </div>
            </div>
          </div>
          <div class="card-footer py-2 d-flex gap-2 flex-wrap">
            <form th:action="@{/backlog/aceptacion/{id}/aprobar(id=${h.id})}" method="post" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-success btn-sm">
                <i class="bi bi-check-circle-fill me-1"></i>Aprobar
              </button>
            </form>
            <form th:action="@{/backlog/aceptacion/{id}/rechazar(id=${h.id})}" method="post" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-danger btn-sm">
                <i class="bi bi-x-octagon-fill me-1"></i>Rechazar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
