# Perfil dev: datos demo; usuarios nuevos del seed usan admin/demo12345 como antes (admin@sigprod.com = admin).
spring.profiles.active=dev

# Aplicación
spring.application.name=SIGPROD
server.port=8206

# MongoDB (Atlas: Network Access debe incluir tu IP o 0.0.0.0/0 en pruebas)
# Timeouts cortos evitan que el login “quede pensando” minutos si no hay conexión al cluster.
spring.data.mongodb.uri=mongodb+srv://Empresarial:Empresarial1@empresarial.lpqrstc.mongodb.net/sigprod?retryWrites=true&w=majority&serverSelectionTimeoutMS=10000&connectTimeoutMS=10000&socketTimeoutMS=15000
spring.data.mongodb.database=sigprod

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# DevTools: desactiva propiedades por defecto extra (evita interferencias con Mongo y propiedades locales).
spring.devtools.add-properties=false
# Reinicio en caliente puede cortar el POST /login.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=true

# Para recarga automática de código durante desarrollo:
# spring.devtools.restart.enabled=true

# --- MongoDB ---
# Si el log muestra localhost:27017 y credential=null, algo vacía la URI:
# - Variable de entorno SPRING_DATA_MONGODB_URI (borrarla o apuntarla a Atlas)
# - Opciones JVM del IDE (-Dspring.data.mongodb.uri=...)
# Esta línea debe ser la única fuente en local salvo que uses perfil separado:

# Security logging (reducir en producción)
logging.level.org.springframework.security=DEBUG

# Multipart (para adjuntos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson (Spring Boot 4 / Jackson 3: fechas vía datatype.datetime, no serialization.*)
spring.jackson.datatype.datetime.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
